<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portafolio Profesional</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
      <div class="container">
        <a class="navbar-brand fw-bold">jhosephdev.app</a>
      </div>
    </nav>

    <header
      class="hero d-flex align-items-center justify-content-center text-center"
    >
      <div>
        <h1 class="fw-bold">Jhoseph Chávez</h1>
        <p class="lead">Desarrollador Web Frontend</p>
        <p class="small opacity-75">Dominio propuesto: jhosephdev.app</p>
        <button class="btn btn-light mt-3" id="scrollBtn">Explorar</button>
      </div>
    </header>

    <section class="container my-5 fade-section">
      <div class="row g-4">
        <div class="col-md-6">
          <div class="card custom-card p-4 text-center">
            <img id="perfilImg" class="profile-img mb-3" />
            <h3>Perfil</h3>
            <p id="perfilTexto"></p>
          </div>
        </div>

        <div class="col-md-6">
          <div class="card custom-card p-4">
            <h3>Habilidades</h3>
            <ul class="list-group list-group-flush">
              <li class="list-group-item" id="hab1"></li>
              <li class="list-group-item" id="hab2"></li>
              <li class="list-group-item" id="hab3"></li>
            </ul>
          </div>
        </div>
      </div>
    </section>

    <section class="container my-5 fade-section">
      <h3 class="text-center mb-4">Proyectos</h3>
      <div class="row g-4">
        <div class="col-md-4">
          <div class="card project-card">
            <img id="img1" class="card-img-top" />
            <div class="card-body">
              <h5 id="title1"></h5>
              <p id="desc1"></p>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card project-card">
            <img id="img2" class="card-img-top" />
            <div class="card-body">
              <h5 id="title2"></h5>
              <p id="desc2"></p>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card project-card">
            <img id="img3" class="card-img-top" />
            <div class="card-body">
              <h5 id="title3"></h5>
              <p id="desc3"></p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="container my-5 fade-section text-center">
      <h3>Enlaces</h3>
      <a
        href="https://linkedin.com"
        target="_blank"
        class="btn btn-outline-dark m-1"
        >LinkedIn</a
      >
      <a
        href="https://github.com"
        target="_blank"
        class="btn btn-outline-dark m-1"
        >GitHub</a
      >
      <a href="https://gmail.com" class="btn btn-outline-dark m-1">Correo</a>
      <a
        href="https://coursera.org"
        target="_blank"
        class="btn btn-outline-dark m-1"
        >Certificados</a
      >
      <a href="#" class="btn btn-outline-dark m-1">Portafolio</a>
    </section>

    <section class="container my-5 fade-section">
      <h3>Contacto</h3>
      <form id="form">
        <input
          type="text"
          id="name"
          class="form-control mb-3"
          placeholder="Ej: Juan Pérez"
        />
        <input
          type="email"
          id="email"
          class="form-control mb-3"
          placeholder="Ej: correo@gmail.com"
        />
        <textarea
          id="message"
          class="form-control mb-3"
          placeholder="Escribe tu mensaje..."
        ></textarea>
        <button class="btn btn-dark w-100">Enviar</button>
      </form>
      <div id="alert" class="mt-3"></div>
    </section>

    <section class="container my-5 fade-section">
      <iframe
        src="https://www.google.com/maps?q=-16.409047,-71.537451&output=embed"
        width="100%"
        height="300"
      ></iframe>
    </section>

    <section class="text-center mb-5">
      <a href="editar.html" class="btn btn-primary">Editar información</a>
    </section>

    <footer class="bg-dark text-white text-center p-3">
      <p>© 2026 Jhoseph Chávez</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
